name: iOS Tests

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

concurrency:
  group: ios-tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  unit-tests:
    name: Unit Tests
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show Xcode version
        run: |
          xcodebuild -version
          xcodebuild -showsdks

      - name: Run unit tests
        env:
          IPHONEOS_DEPLOYMENT_TARGET: "17.0"
        run: |
          DEVICE_ID=$(
            xcodebuild -showdestinations \
              -project MovieApp.xcodeproj \
              -scheme MovieApp \
              IPHONEOS_DEPLOYMENT_TARGET="${IPHONEOS_DEPLOYMENT_TARGET}" 2>/dev/null |
            awk -F '[:,}]' '/platform:iOS Simulator/ && /arch:arm64/ && /name:iPhone/ {
              for (i = 1; i <= NF; i++) {
                if ($i ~ / id$/) {
                  id = $(i + 1)
                  gsub(/^ +| +$/, "", id)
                }
                if ($i ~ / OS$/) {
                  os = $(i + 1)
                  gsub(/^ +| +$/, "", os)
                }
              }
              if (id != "" && os != "") {
                print os " " id
              }
            }' |
            sort -V |
            tail -n 1 |
            awk '{ print $2 }'
          )

          if [ -z "${DEVICE_ID}" ]; then
            echo "No compatible iPhone simulator found."
            xcodebuild -showdestinations \
              -project MovieApp.xcodeproj \
              -scheme MovieApp \
              IPHONEOS_DEPLOYMENT_TARGET="${IPHONEOS_DEPLOYMENT_TARGET}"
            exit 1
          fi

          echo "Using simulator: ${DEVICE_ID}"

          xcodebuild test \
            -project MovieApp.xcodeproj \
            -scheme MovieApp \
            -destination "platform=iOS Simulator,id=${DEVICE_ID}" \
            -only-testing:MovieAppTests \
            IPHONEOS_DEPLOYMENT_TARGET="${IPHONEOS_DEPLOYMENT_TARGET}"

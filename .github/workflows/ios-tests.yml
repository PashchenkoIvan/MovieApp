name: iOS Tests

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

concurrency:
  group: ios-tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  unit-tests:
    name: Unit Tests
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show Xcode version
        run: |
          xcodebuild -version
          xcodebuild -showsdks

      - name: Run unit tests
        env:
          IPHONEOS_DEPLOYMENT_TARGET: "17.0"
        run: |
          DEVICE_ID=$(
            python3 <<'PY'
          import json
          import re
          import subprocess

          result = subprocess.run(
              ["xcrun", "simctl", "list", "devices", "available", "--json"],
              check=True,
              capture_output=True,
              text=True
          )

          data = json.loads(result.stdout)
          candidates = []

          for runtime, devices in data.get("devices", {}).items():
              match = re.search(r"iOS[- ](\d+)[-.](\d+)", runtime)
              if not match:
                  continue

              version = tuple(map(int, match.groups()))

              for device in devices:
                  name = device.get("name", "")
                  if device.get("isAvailable") and name.startswith("iPhone"):
                      candidates.append((version, device.get("udid", "")))

          if candidates:
              print(sorted(candidates)[-1][1])
          PY
          )

          if [ -z "${DEVICE_ID}" ]; then
            echo "No compatible iPhone simulator found."
            xcrun simctl list devices available
            exit 1
          fi

          echo "Using simulator: ${DEVICE_ID}"

          xcodebuild test \
            -project MovieApp.xcodeproj \
            -scheme MovieApp \
            -destination "platform=iOS Simulator,id=${DEVICE_ID}" \
            -only-testing:MovieAppTests \
            IPHONEOS_DEPLOYMENT_TARGET="${IPHONEOS_DEPLOYMENT_TARGET}"
